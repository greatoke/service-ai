<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g opacity="0.8">
    <path d="M400 550C540.457 550 654 436.457 654 296C654 155.543 540.457 42 400 42C259.543 42 146 155.543 146 296C146 436.457 259.543 550 400 550Z" fill="url(#paint0_radial)" fill-opacity="0.2"/>
    
    <!-- Animated circles -->
    <circle cx="400" cy="296" r="180" stroke="url(#paint1_linear)" stroke-width="2" stroke-dasharray="12 8">
      <animate attributeName="r" from="180" to="190" dur="10s" repeatCount="indefinite" />
      <animate attributeName="opacity" from="0.6" to="0.2" dur="10s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="400" cy="296" r="120" stroke="url(#paint2_linear)" stroke-width="2" stroke-dasharray="8 6">
      <animate attributeName="r" from="120" to="130" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" from="0.7" to="0.3" dur="8s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Chat UI Illustration -->
  <rect x="250" y="140" width="300" height="230" rx="12" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  <rect x="250" y="140" width="300" height="45" rx="12" fill="#F3F4F6"/>
  <circle cx="280" cy="162" r="8" fill="#EF4444"/>
  <circle cx="310" cy="162" r="8" fill="#F59E0B"/>
  <circle cx="340" cy="162" r="8" fill="#10B981"/>
  
  <!-- Chat messages -->
  <rect x="275" y="210" width="180" height="30" rx="15" fill="#F3F4F6"/>
  <rect x="295" y="260" width="220" height="30" rx="15" fill="#EBF5FF"/>
  <rect x="315" y="310" width="200" height="30" rx="15" fill="#F3F4F6"/>
  
  <!-- Floating elements -->
  <rect x="540" y="220" width="60" height="60" rx="8" fill="url(#paint3_linear)">
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0,0; 0,10; 0,0" 
      dur="6s" 
      repeatCount="indefinite" 
    />
  </rect>
  
  <rect x="200" y="320" width="40" height="40" rx="8" fill="url(#paint4_linear)">
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0,0; 0,-10; 0,0" 
      dur="5s" 
      repeatCount="indefinite" 
    />
  </rect>
  
  <circle cx="180" cy="220" r="25" fill="url(#paint5_linear)">
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0,0; 0,15; 0,0" 
      dur="7s" 
      repeatCount="indefinite" 
    />
  </circle>
  
  <path d="M600 300L620 330L580 330L600 300Z" fill="#8B5CF6">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 600 315" 
      to="360 600 315" 
      dur="20s" 
      repeatCount="indefinite" 
    />
  </path>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 296) rotate(90) scale(254)">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="paint1_linear" x1="220" y1="296" x2="580" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    
    <linearGradient id="paint2_linear" x1="280" y1="296" x2="520" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    
    <linearGradient id="paint3_linear" x1="540" y1="220" x2="600" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    
    <linearGradient id="paint4_linear" x1="200" y1="320" x2="240" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    
    <linearGradient id="paint5_linear" x1="155" y1="220" x2="205" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
</svg> 